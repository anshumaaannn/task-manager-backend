version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: taskmanager-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: bhundi_1234
      MYSQL_DATABASE: taskmanager

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-pbhundi_1234" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: taskmanager-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskmanager
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: bhundi_1234

volumes:
  mysql-data: